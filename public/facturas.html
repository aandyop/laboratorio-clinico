<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facturación - Laboratorio</title>
    <link rel="stylesheet" href="/stylesheets/style.css">
</head>
<body>
    <nav>
        <a href="/pacientes.html">Pacientes</a> | 
        <a href="/examenes.html">Exámenes</a> |
        <a href="/facturas.html"><strong>Facturación</strong></a> |
        <a href="/medicos.html">Médicos</a>
    </nav>

    <h1>Gestión de Facturas</h1>

    <section>
        <form id="factura-form">
            <select id="paciente_id" required>
                <option value="">Cargando pacientes...</option>
            </select>
            <input type="number" id="monto_total" step="0.01" placeholder="Monto Total" required>
            <select id="metodo_pago" required>
                <option value="Efectivo">Efectivo</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Transferencia">Transferencia</option>
            </select>
            <button type="submit">Generar Factura</button>
        </form>
    </section>

    <hr>

    <section>
        <h2>Historial de Pagos</h2>
        <table border="1" id="facturas-table">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Paciente</th>
                    <th>Monto</th>
                    <th>Método</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>

    <script src="/js/facturas-client.js"></script>
</body>
</html>
