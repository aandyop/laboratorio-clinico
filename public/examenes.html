<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Exámenes - Laboratorio</title>
    <link rel="stylesheet" href="/stylesheets/style.css">
</head>
<body>
    <nav>
        <a href="/pacientes.html">Pacientes</a> | 
        <a href="/examenes.html"><strong>Exámenes</strong></a> |
        <a href="/facturas.html">Facturación</a> |
        <a href="/medicos.html">Médicos</a>
    </nav>

    <h1>Control de Exámenes</h1>

    <section>
        <form id="examen-form">
            <select id="paciente_id" required>
                <option value="">Cargando pacientes...</option>
            </select>
            <input type="text" id="tipo_examen" placeholder="Tipo de Examen" required>
            <input type="text" id="resultado" placeholder="Resultado" required>
            <input type="date" id="fecha" required>
            <button type="submit">Registrar Examen</button>
        </form>
    </section>

    <hr>

    <section>
        <h2>Historial de Exámenes</h2>
        <table border="1" id="examenes-table">
            <thead>
                <tr>
                    <th>Paciente</th>
                    <th>Examen</th>
                    <th>Resultado</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>

    <script src="/js/examenes-client.js"></script>
</body>
</html>
